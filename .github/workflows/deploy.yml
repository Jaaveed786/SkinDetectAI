name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger on push to main branch

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - name: Install Dependencies
        run: |
          cd web-app
          npm install

      - name: Build Project
        run: |
          cd web-app
          npm run build
        env:
          VITE_API_BASE_URL: https://skindetect-api.onrender.com # Placeholder for backend

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: web-app/dist
          clean: true
