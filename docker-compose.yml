version: '3.8'

services:
  # ── Backend: FastAPI Engine ────────────────────────────────────────────────
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: skindetect_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET_KEY=skindetect-ai-super-secret-jwt-key-2024-svit
      - ADMIN_EMAIL=admin@skindetect.ai
      - ADMIN_PASSWORD=Admin@1234
    volumes:
      - ./backend:/app
      - skindetect_data:/app/data

  # ── Frontend: React Web Dashboard ──────────────────────────────────────────
  web-app:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: skindetect_web
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  skindetect_data:
